<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FitTrackr — Calorie Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="page-calories ft-flex ft-flex-column ft-min-vh-100">
    <nav class="navbar navbar-expand-lg fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">FitTrackr</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="navDropdown"
                role="button"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                Navigate
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navDropdown">
                <li><a class="dropdown-item" href="index.html">Home</a></li>
                <li>
                  <a class="dropdown-item active" href="calories.html" aria-current="page">Calories</a>
                </li>
                <li><a class="dropdown-item" href="habits.html">Habits</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="ft-flex-grow-1">
      <div class="ft-container">
        <h1 class="ft-h3 ft-mb-2">Calorie tracker</h1>
        <p class="ft-text-muted ft-small ft-mb-4">Entries are saved in your browser (localStorage).</p>

        <form
          id="calorieForm"
          class="ft-flex ft-flex-wrap ft-flex-md-nowrap ft-gap-2 ft-align-items-end ft-mb-4"
          novalidate
        >
          <div class="ft-flex-grow-1 ft-min-w-0" style="min-width: 10rem">
            <label for="foodName" class="ft-visually-hidden">Food name</label>
            <input
              type="text"
              id="foodName"
              class="form-control"
              placeholder="Food name"
              autocomplete="off"
            />
          </div>
          <div class="ft-flex-shrink-0" style="width: 7.5rem; max-width: 100%">
            <label for="calories" class="ft-visually-hidden">Calories</label>
            <input
              type="number"
              id="calories"
              class="form-control"
              placeholder="Calories"
              min="0"
              step="1"
            />
          </div>
          <div class="ft-flex-shrink-0">
            <button type="submit" id="addCalorieBtn" class="btn btn-accent">Add</button>
          </div>
        </form>

        <ul id="calorieList" class="list-group list-group-flush"></ul>
      </div>
    </main>

    <div class="cal-total-bar">
      <div class="ft-container ft-flex ft-flex-wrap ft-align-items-center ft-justify-between ft-gap-3">
        <span class="ft-fw-medium">Total: <span id="totalCalories">0</span> kcal</span>
        <button type="button" id="clearAllBtn" class="btn ft-btn-link ft-btn-sm ft-p-0">Clear all</button>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/calories.js"></script>
  </body>
</html>
